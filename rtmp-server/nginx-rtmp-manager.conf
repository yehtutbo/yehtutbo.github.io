# ════════════════════════════════════════════════════════════════
#  RTMP Restream Manager — nginx site config
#  File: /etc/nginx/sites-available/rtmp-manager
#
#  ✅ Port 80  → untouched (your SSL/certbot)
#  ✅ Port 443 → untouched (your 3x-ui)
#  ✅ Port 8080 → RTMP Web UI (this file only)
#  ✅ Port 1935 → nginx-rtmp ingest (rtmp-module.conf)
# ════════════════════════════════════════════════════════════════

server {
    listen 8080;
    server_name _;

    # ── HLS stream preview ───────────────────────────────────────
    location /hls {
        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t                    ts;
        }
        root /var/www;
        add_header Cache-Control no-cache;
        add_header Access-Control-Allow-Origin *;
    }

    # ── nginx-rtmp stat page ─────────────────────────────────────
    location /stat {
        rtmp_stat all;
        rtmp_stat_stylesheet stat.xsl;
        add_header Access-Control-Allow-Origin *;
    }

    location /stat.xsl {
        root /usr/share/doc/libnginx-mod-rtmp;
    }

    # ── nginx-rtmp control API ───────────────────────────────────
    location /control {
        rtmp_control all;
        add_header Access-Control-Allow-Origin *;
    }

    # ── Node.js API proxy ────────────────────────────────────────
    location /api {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host       $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # ── Web UI (catch-all → Node.js) ─────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_read_timeout 60s;
    }
}
