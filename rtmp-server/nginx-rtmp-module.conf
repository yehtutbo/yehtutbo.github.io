# ════════════════════════════════════════════════════════════════
#  RTMP Restream Manager — RTMP module config
#  File: /etc/nginx/rtmp-manager-module.conf
#
#  Include this in your main /etc/nginx/nginx.conf by adding:
#    include /etc/nginx/rtmp-manager-module.conf;
#  (outside the http{} block, at the top level)
# ════════════════════════════════════════════════════════════════

rtmp {
    server {
        listen      1935;
        chunk_size  4096;
        buflen      500ms;

        # ── Ingest application ────────────────────────────────────
        application live {
            live on;
            record off;

            # OBS publishes from external IP — allow all publish
            # Play (pull) allowed for ffmpeg relay on localhost
            allow publish all;
            allow play    all;

            # Notify Node.js when OBS connects / disconnects
            on_publish      http://127.0.0.1:3000/rtmp/on_publish;
            on_publish_done http://127.0.0.1:3000/rtmp/on_publish_done;
            notify_method   post;

            # HLS output (viewable at http://IP:8080/hls/<key>.m3u8)
            hls                on;
            hls_path           /var/www/hls;
            hls_fragment       2s;
            hls_playlist_length 10s;
            hls_cleanup        on;
        }
    }
}
